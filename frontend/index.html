<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List Albs</title>
</head>
<body>

<h2>Search Albs</h2>

<input id="search" type="text" placeholder="Search by code or size">

<label for="adultFilter">Alb Type:</label>
<select id="adultFilter">
    <option value="all">All</option>
    <option value="1">Adult Alb</option>
    <option value="0">Child Alb</option>
</select>

<label id="accessoryLabel" for="accessoryFilter">Has Accessory:</label>
<select id="accessoryFilter">
    <option value="all">All</option>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<hr>

<div id="albs"></div>

<script src="app.js"></script>
</body>
</html>
