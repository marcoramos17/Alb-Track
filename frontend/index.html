<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Altar Server</title>
</head>
<body>

    <h1>Add Altar Server</h1>

    <form id="add-server-form" enctype="multipart/form-data">

        <label for="first_name">First Name:</label><br>
        <input type="text" id="first_name" name="first_name" required><br><br>

        <label for="last_name">Last Name:</label><br>
        <input type="text" id="last_name" name="last_name" required><br><br>

        <label for="phone">Phone (optional):</label><br>
        <input type="text" id="phone" name="phone"><br><br>

        <label for="birth_date">Birth Date:</label><br>
        <input type="date" id="birth_date" name="birth_date" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="photo">Photo:</label><br>
        <input type="file" id="photo" name="photo" accept="image/*"><br><br>

        <button type="submit">Add Altar Server</button>

    </form>
    <script src="app.js"></script>
</body>
</html>
